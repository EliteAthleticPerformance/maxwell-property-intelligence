<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>

MPI Reports

</title>

<link
    rel="stylesheet"
    href="../../css/dashboard.css">

<link
    rel="stylesheet"
    href="reports.css">

</head>

<body>

<div class="reports-page">

    <header class="reports-header">

        <h1>

            Investment Memorandums

        </h1>

        <p>

            Maxwell Property Intelligence Report Library

        </p>

    </header>

    <section id="reportStats">

    </section>

    <section class="reports-toolbar">

    <div class="toolbar-search">

        <input
            id="reportSearch"
            type="search"
            placeholder="Search reports...">

    </div>

    <div class="toolbar-controls">

    <select id="reportRecommendation">

        <option value="ALL">

            All Recommendations

        </option>

        <option value="BUY">

            BUY

        </option>

        <option value="HOLD">

            HOLD

        </option>

        <option value="PASS">

            PASS

        </option>

    </select>

    <select id="reportSort">

        ...

    </select>

</div>

    <div class="toolbar-controls">

        <select id="reportSort">

            <option value="newest">

                Newest

            </option>

            <option value="oldest">

                Oldest

            </option>

            <option value="score">

                Investment Score

            </option>

            <option value="confidence">

                AI Confidence

            </option>

            <option value="property">

                Property Name

            </option>

            <option value="recommendation">

                Recommendation

            </option>

        </select>

    </div>

</section>

    <section
        id="reportGrid"
        class="report-grid">

    </section>

</div>

<script src="../../js/services/ReportLibraryService.js"></script>
<script src="reports.js"></script>

</body>

</html>
